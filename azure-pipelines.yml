trigger:
  branches:
    include:
      - main
      - dev

pr:
  branches:
    include:
      - main
      - dev

variables:
  NODE_VERSION: "22.x"
  AZURE_SERVICE_CONNECTION: "GenZNext-AzureDevOps"
  RESOURCE_GROUP: "genznext-rg"
  DEV_VM_NAME: "dev-vm"

stages:
  - stage: Build
    displayName: "Build and Validate"
    jobs:
      - job: BuildJob
        displayName: "Build Job"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "$(NODE_VERSION)"
            displayName: "Use Node.js $(NODE_VERSION)"

          - script: npm ci
            displayName: "Install dependencies"

          - script: npm run build
            displayName: "Build Next.js app"

          - script: npm run lint
            displayName: "Lint code"

  - stage: Deploy_Dev
    displayName: "Deploy to Dev VM"
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
    jobs:
      - job: DeployDev
        displayName: "Deploy to Dev VM"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: "Run deploy command on Dev VM"
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                remote_script=$(cat <<'EOF'
                set -euo pipefail
                export DEBIAN_FRONTEND=noninteractive

                log() {
                  printf '\n[deploy] %s\n' "$1"
                }

                run_step() {
                  local label="$1"
                  shift
                  log "START: ${label}"
                  "$@"
                  log "DONE:  ${label}"
                }

                cd /home/azureuser/expert-learning

                run_step "git pull" timeout 5m git -c pull.ff=only pull --ff-only origin dev
                run_step "npm ci" timeout 15m npm ci
                run_step "npm run build" timeout 20m npm run build

                log "START: pm2 restart"
                set -a
                source /home/azureuser/expert-learning/.env
                set +a

                if pm2 describe expert-learning >/dev/null 2>&1; then
                  timeout 5m pm2 restart expert-learning --update-env
                else
                  timeout 5m pm2 start npm --name expert-learning -- start -- -p 3000
                fi
                log "DONE:  pm2 restart"

                run_step "pm2 save" pm2 save
                EOF
                )

                az vm run-command invoke \
                  --resource-group "$(RESOURCE_GROUP)" \
                  --name "$(DEV_VM_NAME)" \
                  --command-id RunShellScript \
                  --scripts "$remote_script"
