trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: Build
  jobs:
  - job: BuildJob
    displayName: Build Job
    steps:
    - task: NodeTool@0
      displayName: Use Node.js 22
      inputs:
        versionSpec: '22.x'

    - script: npm ci
      displayName: Install dependencies

    - script: npm run build
      displayName: Build app

- stage: Deploy_Prod
  displayName: Deploy to Production VM
  dependsOn: Build
  condition: succeeded()

  jobs:
  - job: Deploy
    displayName: Deploy

    steps:
    - task: SSH@0
      displayName: Deploy on genznext VM
      inputs:
        sshEndpoint: 'genznext-prod-vm-ssh'
        runOptions: 'inline'

        inline: |
          set -e

          echo "===== DEPLOY START ====="

          whoami

          APP_DIR="/opt/expert-learning"
          if [ ! -d "$APP_DIR" ]; then
            APP_DIR="/home/Mithilesh23/expert-learning"
          fi

          cd "$APP_DIR"
          pwd

          git status
          git checkout main
          git fetch origin main
          git reset --hard origin/main

          rm -rf .next
          npm ci
          npm run build

          pm2 restart expert-learning --update-env || pm2 start npm --name expert-learning -- start -- -p 3000
          pm2 status
          pm2 save

          echo "===== DEPLOY DONE ====="

        readyTimeout: '20000'
        failOnStdErr: false