trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: Build
  jobs:
  - job: BuildJob
    displayName: Build Job
    steps:
    - task: NodeTool@0
      displayName: Use Node.js 22
      inputs:
        versionSpec: '22.x'

    - script: npm ci
      displayName: Install dependencies

    - script: npm run build
      displayName: Build app

- stage: Deploy_Prod
  displayName: Deploy to Production VM
  dependsOn: Build
  condition: succeeded()

  jobs:
  - job: Deploy
    displayName: Deploy

    steps:
    - task: SSH@0
      displayName: Deploy on genznext VM
      inputs:
        sshEndpoint: 'genznext-prod-vm-ssh'
        runOptions: 'inline'

        inline: |
          set -e

          echo "===== DEPLOY START ====="

          whoami

          APP_DIR="/opt/expert-learning"
          if [ ! -d "$APP_DIR" ]; then
            APP_DIR="/home/Mithilesh23/expert-learning"
          fi

          cd "$APP_DIR"
          pwd

          git status
          git checkout main
          git fetch origin main
          git reset --hard origin/main

          META_PIXEL_ID="${NEXT_PUBLIC_META_PIXEL_ID:-}"
          if [ -z "$META_PIXEL_ID" ]; then
            for ENV_FILE in .env.production .env.local .env; do
              if [ -f "$ENV_FILE" ]; then
                META_PIXEL_ID="$(grep -E '^NEXT_PUBLIC_META_PIXEL_ID=' "$ENV_FILE" | tail -n1 | cut -d '=' -f2- | sed -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//" | xargs || true)"
                if [ -n "$META_PIXEL_ID" ]; then
                  break
                fi
              fi
            done
          fi

          if [ -z "$META_PIXEL_ID" ]; then
            echo "ERROR: NEXT_PUBLIC_META_PIXEL_ID is missing. Aborting deployment to prevent shipping without Meta Pixel."
            exit 1
          fi

          echo "NEXT_PUBLIC_META_PIXEL_ID detected. Continuing build and deploy."

          rm -rf .next
          npm ci
          npm run build

          pm2 restart expert-learning --update-env || pm2 start npm --name expert-learning -- start -- -p 3000
          pm2 status
          pm2 save

          echo "===== DEPLOY DONE ====="

        readyTimeout: '20000'
        failOnStdErr: false