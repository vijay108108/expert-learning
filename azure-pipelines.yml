trigger:
  branches:
    include:
      - main
      - dev

pr:
  branches:
    include:
      - main
      - dev

variables:
  NODE_VERSION: "22.x"
  AZURE_SERVICE_CONNECTION: "GenZNext-AzureDevOps"
  RESOURCE_GROUP: "genznext-rg"
  DEV_VM_NAME: "dev-vm"

stages:
  - stage: Build
    displayName: "Build and Validate"
    jobs:
      - job: BuildJob
        displayName: "Build Job"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "$(NODE_VERSION)"
            displayName: "Use Node.js $(NODE_VERSION)"

          - script: npm ci
            displayName: "Install dependencies"

          - script: npm run build
            displayName: "Build Next.js app"

          - script: npm run lint
            displayName: "Lint code"

  - stage: Deploy_Dev
    displayName: "Deploy to Dev VM"
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
    jobs:
      - job: DeployDev
        displayName: "Deploy to Dev VM"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: "Run deploy command on Dev VM"
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az vm run-command invoke \
                  --resource-group "$(RESOURCE_GROUP)" \
                  --name "$(DEV_VM_NAME)" \
                  --command-id RunShellScript \
                  --scripts "sudo -u azureuser bash -lc 'cd /home/azureuser/expert-learning && git pull origin dev && npm ci && npm run build && set -a && source /home/azureuser/expert-learning/.env && set +a && pm2 restart expert-learning --update-env'"
