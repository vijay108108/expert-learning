trigger:
  branches:
    include:
      - main
      - dev

pr:
  branches:
    include:
      - main
      - dev

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: "22.x"

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "$(NODE_VERSION)"
    displayName: "Use Node.js $(NODE_VERSION)"

  - script: npm ci
    displayName: "Install dependencies"

  - script: npm run build
    displayName: "Build Next.js app"

  - script: npm run lint
    displayName: "Lint code"
