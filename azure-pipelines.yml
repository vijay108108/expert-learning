trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: Build
  jobs:
  - job: BuildJob
    displayName: Build Job
    steps:
    - task: NodeTool@0
      displayName: Use Node.js 22
      inputs:
        versionSpec: '22.x'

    - script: npm ci
      displayName: Install dependencies

    - script: npm run build
      displayName: Build app

- stage: Deploy_Prod
  displayName: Deploy to Production VM
  dependsOn: Build
  condition: succeeded()

  jobs:
  - job: Deploy
    displayName: Deploy

    steps:
    - task: SSH@0
      displayName: Deploy on genznext VM
      inputs:
        sshEndpoint: 'genznext-prod-vm-ssh'
        runOptions: 'inline'

        inline: |
          set -e

          echo "===== DEPLOY START ====="

          whoami
          cd /home/Mithilesh23/expert-learning
          pwd

          git status
          git checkout main
          git pull origin main

          rm -rf .next
          npm ci
          npm run build

          pm2 restart genznext --update-env
          pm2 save

          echo "===== DEPLOY DONE ====="

        readyTimeout: '20000'
        failOnStdErr: false