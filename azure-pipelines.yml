trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: Build
  jobs:
  - job: BuildJob
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '22.x'

    - script: npm install
      displayName: Install dependencies

    - script: npm run build
      displayName: Build app

- stage: Deploy_Prod
  displayName: Deploy to Production VM
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Deploy
    steps:
    - task: SSH@0
      displayName: Deploy on genznext VM
      inputs:
        sshEndpoint: 'genznext-prod-vm-ssh'
        runOptions: 'commands'
        commands: |
          cd /home/Mithilesh23/expert-learning
          git checkout main
          git pull origin main
          npm install
          npm run build
          pm2 restart genznext
          pm2 save
        readyTimeout: '20000'